<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Magik.Cell - Ayuda</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #0f172a;
    color: white;
    margin: 0;
}

h1 { margin-top: 20px; }

.card-btn {
    display: flex;
    align-items: center;
    width: 300px;
    margin: 15px auto;
    padding: 15px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: white;
}

.card-btn img {
    width: 40px;
    margin-right: 15px;
}

.samsung { background: #1428a0; }
.motorola { background: #ff0000; }
.patron { background: #22c55e; color: black; }

.back-btn {
    background: #ef4444;
    color: white;
    padding: 12px 20px;
    margin-top: 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

.cell {
    width: 80px;
    height: 80px;
    background: #334155;
    border-radius: 50%;
    line-height: 80px;
    font-size: 20px;
    cursor: pointer;
}

.cell.active { background: #22c55e; }

img.demo {
    width: 150px;
    margin: 10px;
    border-radius: 10px;
}

#contenido {
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>Magik.Cell</h1>
<p>Seleccioná una opción</p>

<button class="card-btn samsung" onclick="mostrar('samsung')">
<img src="samsung_logo.png"> Samsung (Download)
</button>

<button class="card-btn motorola" onclick="mostrar('motorola')">
<img src="motorola_logo.png"> Motorola (Fastboot)
</button>

<button class="card-btn patron" onclick="mostrar('patron')">
<img src="patron_icon.png"> Enviar Patrón
</button>

<div id="contenido"></div>

<script>
let patron = [];

function mostrar(tipo){
    let c = document.getElementById("contenido");
    let volver = `<button class="back-btn" onclick="volverInicio()">⬅ Volver al inicio</button>`;

    if(tipo === "samsung"){
        c.innerHTML = `
        <h2>Samsung</h2>
        <img src="download_mode.jpg" class="demo">
        <p>1. Apagar celular</p>
        <p>2. Mantener presionados Vol+ y Vol-</p>
        <p>3. Conectar cable</p>
        <p>4. Presionar Vol+</p>
        <a href="https://wa.me/5491123177277?text=Hola,%20te%20mando%20la%20foto%20del%20modo%20Download%20(Samsung)" target="_blank">
            <button>Enviar por WhatsApp</button>
        </a>
        ${volver}
        `;
    }

    if(tipo === "motorola"){
        c.innerHTML = `
        <h2>Motorola</h2>
        <img src="fastboot_mode.jpg" class="demo">
        <p>1. Apagar celular</p>
        <p>2. Mantener Vol- + Power</p>
        <a href="https://wa.me/5491123177277?text=Hola,%20te%20mando%20la%20foto%20del%20modo%20Fastboot%20(Motorola)" target="_blank">
            <button>Enviar por WhatsApp</button>
        </a>
        ${volver}
        `;
    }

    if(tipo === "patron"){
        c.innerHTML = `
        <h2>Ingresar patrón</h2>
        <div class="grid">
            ${[1,2,3,4,5,6,7,8,9].map(n=>`<div class="cell" onclick="agregar(this, ${n})">${n}</div>`).join('')}
        </div>
        <p id="resultado"></p>
        <button onclick="borrar()">Borrar</button>
        <button onclick="enviarWhatsapp()">Enviar por WhatsApp</button>
        ${volver}
        `;
    }
}

function volverInicio(){
    document.getElementById("contenido").innerHTML = "";
    patron = [];
}

function agregar(el, n){
    patron.push(n);
    el.classList.add("active");
    document.getElementById("resultado").innerText = "Patrón: " + patron.join("-");
}

function borrar(){
    patron = [];
    document.querySelectorAll(".cell").forEach(c=>c.classList.remove("active"));
    document.getElementById("resultado").innerText = "";
}

/* 🔥 ESTA ES LA CLAVE */
function enviarWhatsapp(){
    if(patron.length === 0){
        alert("No hay patrón");
        return;
    }

    let texto = "Hola, mi patrón es: " + patron.join("-");
    let url = "https://wa.me/5491123177277?text=" + encodeURIComponent(texto);

    window.open(url, "_blank");
}
</script>

</body>
</html>
